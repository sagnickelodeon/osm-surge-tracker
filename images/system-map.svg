<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1150" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#55606E"/>
    </marker>
  </defs>

  <rect x="4" y="4" width="1072" height="1142" rx="16" fill="#0E1117" stroke="#20262F" stroke-width="1.5"/>

  <!-- eyebrow -->
  <text x="34" y="42" font-size="12" font-weight="600" letter-spacing="2.5" fill="#6B7480">SYSTEM MAP</text>
  <text x="1046" y="42" font-size="12" font-weight="600" letter-spacing="0.5" fill="#4B5563" text-anchor="end">4 processes · Redis Streams + Parquet</text>

  <!-- ================= SOURCE ================= -->
  <rect x="390" y="60" width="300" height="48" rx="24" fill="#12161D" stroke="#313A46"/>
  <circle cx="418" cy="84" r="9" fill="none" stroke="#4EA1FF" stroke-width="1.5"/>
  <path d="M409,84 h18 M418,75 v18 M411,79 q7,5 14,0 M411,89 q7,-5 14,0" stroke="#4EA1FF" stroke-width="0.9" fill="none" opacity="0.8"/>
  <text x="436" y="89" font-size="13.5" font-weight="600" fill="#C7CDD6">planet.openstreetmap.org</text>
  <line x1="540" y1="108" x2="540" y2="150" stroke="#3C4552" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="550" y="133" font-size="10.5" fill="#8A93A0" font-family="'SF Mono','Cascadia Code',Consolas,monospace">HTTP GET .osc.gz · 60s</text>

  <!-- ================= COMPONENT 1 · POLLER ================= -->
  <rect x="340" y="152" width="400" height="82" rx="12" fill="#161B24" stroke="#272D38"/>
  <circle cx="368" cy="180" r="13" fill="#4EA1FF"/>
  <text x="368" y="181" font-size="13" font-weight="700" fill="#0E1117" text-anchor="middle" dominant-baseline="central">1</text>
  <text x="390" y="177" font-size="16" font-weight="700" fill="#E7EBF2">Poller</text>
  <text x="390" y="195" font-size="11" fill="#6B7480" font-family="'SF Mono','Cascadia Code',Consolas,monospace">poller/</text>
  <text x="360" y="222" font-size="12" fill="#9AA4B2">Pull minutely diffs · parse edits · push raw events</text>

  <line x1="540" y1="234" x2="540" y2="278" stroke="#3C4552" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="550" y="252" font-size="10.5" fill="#8A93A0" font-family="'SF Mono','Cascadia Code',Consolas,monospace">Redis Stream · osm:raw</text>
  <text x="550" y="267" font-size="10" fill="#6B7480">max 500k entries ≈ 8 h</text>

  <!-- ================= COMPONENT 2 · STREAM PROCESSOR ================= -->
  <rect x="60" y="280" width="960" height="322" rx="14" fill="#13181F" stroke="#272D38"/>
  <circle cx="92" cy="312" r="13" fill="#8B7CF6"/>
  <text x="92" y="313" font-size="13" font-weight="700" fill="#0E1117" text-anchor="middle" dominant-baseline="central">2</text>
  <text x="114" y="309" font-size="16" font-weight="700" fill="#E7EBF2">Stream Processor</text>
  <text x="114" y="327" font-size="11" fill="#6B7480" font-family="'SF Mono','Cascadia Code',Consolas,monospace">processor/ · 8 async coroutines</text>
  <line x1="80" y1="340" x2="1000" y2="340" stroke="#232a34" stroke-width="1"/>

  <!-- left column: data path -->
  <text x="94" y="366" font-size="9.5" font-weight="600" letter-spacing="1.5" fill="#6B7480">DATA PATH</text>
  <!-- chips -->
  <g font-family="'SF Mono','Cascadia Code',Consolas,monospace">
    <rect x="90" y="376" width="530" height="34" rx="8" fill="#181E27" stroke="#2A313C"/>
    <text x="106" y="397" font-size="11.5" fill="#D7DCE4">consume_and_enrich → enricher.py</text>
    <text x="604" y="397" font-size="9.5" font-weight="700" fill="#CD7F32" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif">BRONZE</text>

    <rect x="90" y="430" width="530" height="34" rx="8" fill="#181E27" stroke="#2A313C"/>
    <text x="106" y="451" font-size="11.5" fill="#D7DCE4">flush_windows_loop → aggregator.py</text>
    <text x="604" y="451" font-size="9.5" font-weight="700" fill="#C4CAD4" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif">SILVER</text>

    <rect x="90" y="484" width="530" height="34" rx="8" fill="#181E27" stroke="#2A313C"/>
    <text x="106" y="505" font-size="11.5" fill="#D7DCE4">detect_anomalies_loop → anomaly_detector.py</text>
    <text x="604" y="505" font-size="9.5" font-weight="700" fill="#F2C14E" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif">GOLD</text>

    <rect x="90" y="538" width="530" height="34" rx="8" fill="#181E27" stroke="#2A313C"/>
    <text x="106" y="559" font-size="11.5" fill="#D7DCE4">explain_surges_loop → explainer.py</text>
    <text x="604" y="559" font-size="9.5" font-weight="700" fill="#FF7A59" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif">GDELT + OpenAI</text>
  </g>
  <!-- connectors + transport labels -->
  <line x1="130" y1="410" x2="130" y2="430" stroke="#4A5563" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="140" y="424" font-size="9.5" fill="#6B7480" font-family="'SF Mono',Consolas,monospace">WindowBuffer · 5 min</text>
  <line x1="130" y1="464" x2="130" y2="484" stroke="#4A5563" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="140" y="478" font-size="9.5" fill="#6B7480" font-family="'SF Mono',Consolas,monospace">anomaly_queue</text>
  <line x1="130" y1="518" x2="130" y2="538" stroke="#4A5563" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="140" y="532" font-size="9.5" fill="#6B7480" font-family="'SF Mono',Consolas,monospace">osm:surges</text>

  <!-- divider -->
  <line x1="656" y1="356" x2="656" y2="580" stroke="#232a34" stroke-width="1"/>

  <!-- right column: periodic loops -->
  <text x="680" y="366" font-size="9.5" font-weight="600" letter-spacing="1.5" fill="#6B7480">PERIODIC LOOPS</text>
  <g font-family="'SF Mono','Cascadia Code',Consolas,monospace">
    <circle cx="686" cy="392" r="3.5" fill="#8B7CF6"/>
    <text x="700" y="396" font-size="11" fill="#C7CDD6">update_baselines_loop · baseline.py</text>
    <text x="1000" y="396" font-size="10" fill="#8A93A0" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif">hourly</text>

    <circle cx="686" cy="428" r="3.5" fill="#8B7CF6"/>
    <text x="700" y="432" font-size="11" fill="#C7CDD6">cleanup_loop · db.py</text>
    <text x="1000" y="432" font-size="10" fill="#8A93A0" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif">daily</text>

    <circle cx="686" cy="464" r="3.5" fill="#8B7CF6"/>
    <text x="700" y="468" font-size="11" fill="#C7CDD6">snapshot_loop · snapshot.py</text>
    <text x="1000" y="468" font-size="10" fill="#8A93A0" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif">60 s</text>

    <circle cx="686" cy="500" r="3.5" fill="#8B7CF6"/>
    <text x="700" y="504" font-size="11" fill="#C7CDD6">archive_loop · blob_uploader.py</text>
    <text x="1000" y="504" font-size="10" fill="#8A93A0" text-anchor="end" font-family="'Segoe UI',system-ui,sans-serif">hourly → Azure</text>
  </g>
  <rect x="674" y="528" width="330" height="52" rx="9" fill="#191F28" stroke="#313A46"/>
  <text x="690" y="548" font-size="10.5" fill="#9AA4B2">Single DuckDB conn + single Redis client;</text>
  <text x="690" y="565" font-size="10.5" fill="#9AA4B2">one coroutine at a time — no locks needed.</text>

  <!-- fan-out to three sinks -->
  <line x1="210" y1="602" x2="210" y2="648" stroke="#3C4552" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="220" y="628" font-size="9.5" fill="#8A93A0" font-family="'SF Mono',Consolas,monospace">RW lock</text>
  <line x1="540" y1="602" x2="540" y2="648" stroke="#3C4552" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="550" y="628" font-size="9.5" fill="#8A93A0" font-family="'SF Mono',Consolas,monospace">snapshot · 60s</text>
  <line x1="870" y1="602" x2="870" y2="648" stroke="#3C4552" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="880" y="628" font-size="9.5" fill="#8A93A0" font-family="'SF Mono',Consolas,monospace">archive · hourly</text>

  <!-- ================= STORAGE SINKS ================= -->
  <!-- DuckDB -->
  <rect x="60" y="650" width="300" height="168" rx="12" fill="#161B24" stroke="#272D38"/>
  <path d="M84,672 L84,700 A14,5 0 0 0 112,700 L112,672" fill="#1B222C" stroke="#3B4552" stroke-width="1.1"/>
  <ellipse cx="98" cy="672" rx="14" ry="5" fill="#26303B" stroke="#3B4552" stroke-width="1.1"/>
  <text x="126" y="674" font-size="13.5" font-weight="700" fill="#E7EBF2">DuckDB warehouse</text>
  <text x="126" y="690" font-size="10" fill="#6B7480" font-family="'SF Mono',Consolas,monospace">data/osm_surge.duckdb</text>
  <g font-family="'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#9AA4B2">
    <text x="80" y="722">bronze_raw_edits<tspan fill="#6B7480">  · 3d</tspan></text>
    <text x="80" y="744">silver_windowed_edits<tspan fill="#6B7480">  · 8d</tspan></text>
    <text x="80" y="766">baselines<tspan fill="#6B7480">  · rebuilt hourly</tspan></text>
    <text x="80" y="788">gold_surges<tspan fill="#6B7480">  · kept</tspan></text>
  </g>
  <text x="80" y="808" font-size="9.5" fill="#FF7A59">processor-only — single-writer lock</text>

  <!-- Parquet -->
  <rect x="390" y="650" width="300" height="168" rx="12" fill="#161B24" stroke="#272D38"/>
  <rect x="412" y="666" width="12" height="12" rx="2" fill="#4FB0C6"/>
  <text x="434" y="676" font-size="13.5" font-weight="700" fill="#E7EBF2">Parquet snapshots</text>
  <text x="412" y="694" font-size="10" fill="#6B7480" font-family="'SF Mono',Consolas,monospace">data/api/*.parquet</text>
  <g font-family="'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#9AA4B2">
    <text x="410" y="726">gold_surges.parquet</text>
    <text x="410" y="748">silver_windowed<tspan fill="#6B7480">  · 48h</tspan></text>
    <text x="410" y="770">bronze_recent<tspan fill="#6B7480">  · 2h</tspan></text>
  </g>
  <text x="410" y="800" font-size="9.5" fill="#4FB0C6">read by the API (no lock, always fresh)</text>

  <!-- Azure Blob -->
  <rect x="720" y="650" width="300" height="168" rx="12" fill="#161B24" stroke="#272D38"/>
  <rect x="742" y="666" width="12" height="12" rx="2" fill="#3B8EEA"/>
  <text x="764" y="676" font-size="13.5" font-weight="700" fill="#E7EBF2">Azure Blob</text>
  <text x="742" y="694" font-size="10" fill="#6B7480" font-family="'SF Mono',Consolas,monospace">container · optional</text>
  <g font-family="'SF Mono','Cascadia Code',Consolas,monospace" font-size="11" fill="#9AA4B2">
    <text x="740" y="726">silver/&lt;date&gt;/HH.parquet</text>
    <text x="740" y="748">gold/&lt;date&gt;/HH.parquet</text>
    <text x="740" y="770">logs/visits-*.log</text>
  </g>
  <text x="740" y="800" font-size="9.5" fill="#3B8EEA">+ visitor log written by the API</text>

  <!-- Parquet -> API -->
  <line x1="540" y1="818" x2="540" y2="860" stroke="#3C4552" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="550" y="843" font-size="10" fill="#8A93A0" font-family="'SF Mono',Consolas,monospace">read_parquet()</text>

  <!-- ================= COMPONENT 3a · FASTAPI ================= -->
  <rect x="300" y="862" width="480" height="104" rx="12" fill="#161B24" stroke="#272D38"/>
  <rect x="320" y="878" width="30" height="24" rx="12" fill="#46C39A"/>
  <text x="335" y="890" font-size="12" font-weight="700" fill="#0E1117" text-anchor="middle" dominant-baseline="central">3a</text>
  <text x="360" y="887" font-size="15.5" font-weight="700" fill="#E7EBF2">FastAPI — read-only API</text>
  <text x="360" y="904" font-size="10.5" fill="#6B7480" font-family="'SF Mono',Consolas,monospace">api/ · in-memory DuckDB over the Parquet snapshots</text>
  <text x="320" y="936" font-size="11" fill="#9AA4B2" font-family="'SF Mono',Consolas,monospace">/health · /surges/active · /surges/history · /heatmap · /stats</text>
  <text x="320" y="954" font-size="10" fill="#6B7480">Missing snapshot → empty result, never a 500.</text>

  <line x1="540" y1="966" x2="540" y2="1008" stroke="#3C4552" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="550" y="991" font-size="10.5" fill="#8A93A0" font-family="'SF Mono',Consolas,monospace">JSON over HTTP</text>

  <!-- ================= COMPONENT 3b · DASHBOARD ================= -->
  <rect x="300" y="1010" width="480" height="112" rx="12" fill="#161B24" stroke="#272D38"/>
  <rect x="320" y="1026" width="30" height="24" rx="12" fill="#46C39A"/>
  <text x="335" y="1038" font-size="12" font-weight="700" fill="#0E1117" text-anchor="middle" dominant-baseline="central">3b</text>
  <text x="360" y="1035" font-size="15.5" font-weight="700" fill="#E7EBF2">Next.js dashboard</text>
  <text x="360" y="1052" font-size="10.5" fill="#6B7480" font-family="'SF Mono',Consolas,monospace">dashboard-web/ · Vercel</text>
  <text x="320" y="1082" font-size="11.5" fill="#9AA4B2">Dark “intelligence monitor” — deck.gl world map + live surge feed.</text>
  <text x="320" y="1102" font-size="11" fill="#9AA4B2">Polls every 60 s; a server-side proxy keeps the API plain-HTTP.</text>
</svg>
